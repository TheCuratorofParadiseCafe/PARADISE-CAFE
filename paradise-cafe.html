<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パラダイス・カフェ | Paradise Cafe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "楷体", "STKaiti", serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            background: #000;
        }
        #space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .meteor {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
            transform: rotate(-45deg);
        }
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.3;
            animation: nebulaGlow 15s ease-in-out infinite alternate;
        }
        .milky-way {
            position: absolute;
            width: 100%;
            height: 300px;
            background: linear-gradient(90deg, 
                transparent,
                rgba(255, 255, 255, 0.05),
                rgba(200, 200, 255, 0.1),
                rgba(255, 200, 255, 0.1),
                rgba(200, 200, 255, 0.1),
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transform: rotate(15deg);
            top: 30%;
            left: -50%;
            filter: blur(20px);
        }
        .content {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
        }
        h1 {
            font-size: 4em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, 
                #ff00ff, #ff0080, #ff0000, #ff8000, 
                #ffff00, #00ff00, #00ffff, #0080ff, 
                #0000ff, #8000ff, #ff00ff
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 300% 300%;
            animation: rainbow 5s linear infinite;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .subtitle {
            font-size: 1.5em;
            line-height: 2;
            margin-bottom: 60px;
            background: linear-gradient(90deg, 
                #ff0000, #ff9900, #ffff00, #00ff00, 
                #00ffff, #0000ff, #ff00ff
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 400% 400%;
            animation: rainbow 4s linear infinite;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }
        .section {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.1),
                inset 0 0 30px rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }
        .section:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 15px 40px rgba(255, 255, 255, 0.2),
                inset 0 0 40px rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            margin-top: 0;
            font-size: 1.8em;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }
        .section p {
            color: #ccccff;
            margin-bottom: 20px;
            line-height: 1.7;
        }
        .section a {
            color: #ffff00;
            text-decoration: none;
            text-shadow: 0 0 10px yellow;
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        @keyframes nebulaGlow {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(1.1); }
        }
        @keyframes meteor {
            0% { left: -100px; top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 100vw; top: 100vh; opacity: 0; }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5em; }
            .sections { grid-template-columns: 1fr; }
            .section { padding: 20px; }
        }
    </style>
</head>
<body>
    <!-- 太空背景 -->
    <div id="space"></div>
    
    <!-- 主要内容 -->
    <div class="content">
        <h1>Welcome to the パラダイス・カフェ</h1>
        <div class="subtitle">
            ここはパラダイス・カフェ<br>
            夜明けまで悩みのない客が<br>
            みんなパラダイス・カフェ<br>
            テーブルの向こうに見る甘い梦
        </div>
        
        <div class="sections">
            <div class="section">
                <h2>中島みゆき オリジナル日本語歌詞全集</h2>
                <p>中島みゆきの歌詞分析、アルバム分析、および感慨や感想を含んでいます。</p>
                <a href="#">✨ 見る →</a>
            </div>
            <div class="section">
                <h2>館長の個人blog</h2>
                <p>館長による考察記録</p>
                <a href="#">✨ 読む →</a>
            </div>
            <div class="section">
                <h2>中島みゆき文書館</h2>
                <p>閉鎖した中島みゆきの個人ファンサイトの資料や、その他の日本語でのインタビュー記事などを含んでいます</p>
                <a href="#">✨ 探索 →</a>
            </div>
        </div>
        
        <!-- 返回首页导航 -->
        <div style="
            margin-top: 80px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        ">
            <div style="
                display: flex;
                justify-content: center;
                gap: 30px;
                flex-wrap: wrap;
                margin-bottom: 20px;
            ">
                <a href="index.html" style="
                    color: #ff00ff;
                    text-decoration: none;
                    font-size: 1.2em;
                    padding: 10px 25px;
                    border: 1px solid #ff00ff;
                    border-radius: 25px;
                    transition: all 0.3s;
                    text-shadow: 0 0 10px #ff00ff;
                " onmouseover="this.style.background='rgba(255,0,255,0.2)'; this.style.transform='translateY(-3px)';" 
                   onmouseout="this.style.background='transparent'; this.style.transform='translateY(0)';">
                    🏠 ホームに戻る
                </a>
                </a>
            </div>
            
            <p style="color: #aaa; font-size: 0.9em; margin-top: 20px;">
                © 2026 パラダイス・カフェ | 中島みゆきファンサイト | 
            </p>
        </div>
    </div>
    
    <!-- 隐形音乐系统 - 已修复音频链接 -->
    <audio id="invisible-bgm" loop preload="auto" style="display: none;">
        <!-- 重要：已修改为新用户名 -->
        <source src="https://thecuratorofparadisecafe.github.io/PARADISE-CAFE/%E3%83%8F%E3%82%9A%E3%83%A9%E3%82%BF%E3%82%99%E3%82%A4%E3%82%B9%E3%83%BB%E3%82%AB%E3%83%95%E3%82%A7.mp3" type="audio/mpeg">
    </audio>
    
    <div id="music-hint" style="
        position: fixed;
        top: 15px;
        right: 15px;
        z-index: 999;
        color: rgba(255,255,255,0.6);
        font-size: 0.8em;
        background: rgba(0,0,0,0.3);
        padding: 5px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(5px);
        opacity: 0;
        transition: opacity 0.5s;
        pointer-events: none;
    ">
        🎵 パラダイス・カフェ
    </div>
    
    <script>
    // ========== 星空背景生成 ==========
    const space = document.getElementById('space');
    
    // 创建星星
    for (let i = 0; i < 1500; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        star.style.width = star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        const brightness = Math.random();
        if (brightness < 0.4) star.style.opacity = Math.random() * 0.4 + 0.6;
        else if (brightness < 0.8) star.style.opacity = Math.random() * 0.3 + 0.3;
        else star.style.opacity = Math.random() * 0.3 + 0.1;
        if (Math.random() > 0.7) {
            const duration = Math.random() * 2 + 1;
            const delay = Math.random() * 3;
            star.style.animation = `rainbow ${duration}s ease-in-out infinite ${delay}s`;
        }
        space.appendChild(star);
    }
    
    // 创建流星
    for (let i = 0; i < 8; i++) {
        const meteor = document.createElement('div');
        meteor.className = 'meteor';
        const startX = Math.random() * 20;
        const startY = Math.random() * 100;
        meteor.style.left = startX + '%';
        meteor.style.top = startY + '%';
        const length = Math.random() * 150 + 100;
        meteor.style.width = length + 'px';
        const colors = [
            'linear-gradient(90deg, #ffffff, #ffff00, transparent)',
            'linear-gradient(90deg, #ffffff, #00ffff, transparent)',
            'linear-gradient(90deg, #ffffff, #ff00ff, transparent)'
        ];
        meteor.style.background = colors[Math.floor(Math.random() * colors.length)];
        const speed = Math.random() * 1.5 + 1;
        const delay = Math.random() * 20 + 5;
        meteor.style.animation = `meteor ${speed}s linear infinite`;
        meteor.style.animationDelay = delay + 's';
        space.appendChild(meteor);
    }
    
    // 创建星云
    const nebulaColors = [
        ['rgba(255, 100, 255, 0.3)', 'rgba(200, 50, 255, 0.2)'],
        ['rgba(100, 200, 255, 0.3)', 'rgba(50, 150, 255, 0.2)'],
        ['rgba(255, 200, 100, 0.3)', 'rgba(255, 150, 50, 0.2)'],
        ['rgba(100, 255, 200, 0.3)', 'rgba(50, 255, 150, 0.2)'],
    ];
    for (let i = 0; i < 4; i++) {
        const nebula = document.createElement('div');
        nebula.className = 'nebula';
        const size = Math.random() * 300 + 200;
        nebula.style.width = nebula.style.height = size + 'px';
        nebula.style.left = Math.random() * 80 + 10 + '%';
        nebula.style.top = Math.random() * 80 + 10 + '%';
        const [color1, color2] = nebulaColors[i];
        nebula.style.background = `radial-gradient(circle, ${color1} 0%, ${color2} 50%, transparent 100%)`;
        const duration = Math.random() * 10 + 10;
        const delay = Math.random() * 5;
        nebula.style.animation = `nebulaGlow ${duration}s ease-in-out infinite alternate ${delay}s`;
        space.appendChild(nebula);
    }
    
    // 创建星河
    const milkyWay = document.createElement('div');
    milkyWay.className = 'milky-way';
    space.appendChild(milkyWay);
    
    // ========== 隐形音乐系统 ==========
    const bgm = document.getElementById('invisible-bgm');
    const musicHint = document.getElementById('music-hint');
    
    // 添加更可靠的自动播放策略
    let audioInitialized = false;
    
    // 设置背景音乐音量（较低，不干扰）
    bgm.volume = 0.2;
    
    // 显示短暂的音乐提示
    function showMusicHint(text, color) {
        musicHint.textContent = text;
        musicHint.style.color = color;
        musicHint.style.opacity = '1';
        
        // 3秒后淡出
        setTimeout(() => {
            musicHint.style.opacity = '0';
        }, 3000);
    }
    
    // 尝试自动播放
    function tryAutoPlay() {
        if (audioInitialized) return;
        
        const playPromise = bgm.play();
        
        if (playPromise !== undefined) {
            playPromise.then(() => {
                // 播放成功
                audioInitialized = true;
                console.log('🎵 パラダイス・カフェ 自动播放成功');
                showMusicHint('🎵 パラダイス・カフェ 再生中', '#00ff00');
            }).catch(error => {
                // 自动播放被阻止
                console.log('自动播放被阻止，显示提示');
                showMusicHint('🎵 点击页面开始音乐', '#ff9900');
                
                // 添加点击播放提示
                const playPrompt = document.createElement('div');
                playPrompt.innerHTML = '🎵 点击任意处播放《パラダイス・カフェ》';
                playPrompt.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: rgba(0,0,0,0.85);
                    color: #ffd700;
                    padding: 20px 30px;
                    border-radius: 15px;
                    border: 2px solid #ffd700;
                    z-index: 1001;
                    text-align: center;
                    cursor: pointer;
                    backdrop-filter: blur(10px);
                    font-size: 1.1em;
                    box-shadow: 0 0 30px rgba(255,215,0,0.3);
                    animation: pulse 2s infinite;
                `;
                
                // 添加脉动动画
                const pulseStyle = document.createElement('style');
                pulseStyle.textContent = `
                    @keyframes pulse {
                        0% { transform: translate(-50%, -50%) scale(1); }
                        50% { transform: translate(-50%, -50%) scale(1.05); }
                        100% { transform: translate(-50%, -50%) scale(1); }
                    }
                `;
                document.head.appendChild(pulseStyle);
                
                document.body.appendChild(playPrompt);
                
                // 点击提示开始播放
                playPrompt.addEventListener('click', function() {
                    bgm.play().then(() => {
                        audioInitialized = true;
                        showMusicHint('🎵 再生開始', '#00ff00');
                        this.remove();
                    });
                });
                
                // 页面任意位置点击也开始播放
                document.addEventListener('click', function startOnInteraction() {
                    if (!audioInitialized) {
                        bgm.play().then(() => {
                            audioInitialized = true;
                            showMusicHint('🎵 再生開始', '#00ff00');
                            if (playPrompt.parentNode) {
                                playPrompt.remove();
                            }
                        });
                    }
                    document.removeEventListener('click', startOnInteraction);
                }, { once: true });
            });
        }
    }
    
    // 页面加载后尝试播放
    window.addEventListener('load', function() {
        // 等待页面完全加载
        setTimeout(() => {
            // 先检查音频文件是否存在
            fetch(bgm.src)
                .then(response => {
                    if (response.ok) {
                        console.log('✅ 音频文件可访问');
                        tryAutoPlay();
                    } else {
                        console.log('❌ 音频文件不存在或无法访问');
                        showMusicHint('🎵 音乐文件加载失败', '#ff5555');
                    }
                })
                .catch(error => {
                    console.log('❌ 音频文件加载错误:', error);
                    showMusicHint('🎵 音乐加载错误', '#ff5555');
                });
        }, 1000);
    });
    
    // 键盘快捷键控制
    document.addEventListener('keydown', function(e) {
        // 空格键：播放/暂停
        if (e.code === 'Space') {
            e.preventDefault();
            if (bgm.paused) {
                bgm.play();
                showMusicHint('🎵 再生再開', '#00ff00');
            } else {
                bgm.pause();
                showMusicHint('⏸️ 一時停止', '#ff9900');
            }
        }
        // 上箭头：音量+
        if (e.code === 'ArrowUp') {
            e.preventDefault();
            bgm.volume = Math.min(1, bgm.volume + 0.1);
            showMusicHint(`🔊 ${Math.round(bgm.volume * 100)}%`, '#ffff00');
        }
        // 下箭头：音量-
        if (e.code === 'ArrowDown') {
            e.preventDefault();
            bgm.volume = Math.max(0, bgm.volume - 0.1);
            showMusicHint(`🔉 ${Math.round(bgm.volume * 100)}%`, '#ffff00');
        }
        // M键：静音切换
        if (e.code === 'KeyM') {
            e.preventDefault();
            bgm.muted = !bgm.muted;
            showMusicHint(bgm.muted ? '🔇 ミュート' : '🔊 ミュート解除', bgm.muted ? '#ff5555' : '#00ff00');
        }
    });
    
    // 可选：在页面角落添加极简控制
    const style = document.createElement('style');
    style.textContent = `
        #music-control-corner {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 998;
            opacity: 0.2;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        #music-control-corner:hover {
            opacity: 0.8;
            background: rgba(0,0,0,0.5);
            border-color: rgba(255,215,0,0.5);
            width: 120px;
            border-radius: 15px;
        }
        #music-control-corner:hover::after {
            content: ' 音楽';
            margin-left: 5px;
            font-size: 11px;
        }
    `;
    document.head.appendChild(style);
    
    // 创建角落控制点（可选）
    const cornerControl = document.createElement('div');
    cornerControl.id = 'music-control-corner';
    cornerControl.innerHTML = '♪';
    document.body.appendChild(cornerControl);
    
    // 角落控制点击事件
    cornerControl.addEventListener('click', function(e) {
        e.stopPropagation();
        if (bgm.paused) {
            bgm.play();
            showMusicHint('🎵 再生開始', '#00ff00');
        } else {
            bgm.pause();
            showMusicHint('⏸️ 一時停止', '#ff9900');
        }
    });
    
    // 角落控制右键菜单（音量控制）
    cornerControl.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        // 切换静音
        bgm.muted = !bgm.muted;
        showMusicHint(bgm.muted ? '🔇 ミュート' : '🔊 ミュート解除', bgm.muted ? '#ff5555' : '#00ff00');
        
        return false;
    });
    
    // 双击角落控制显示音量提示
    cornerControl.addEventListener('dblclick', function(e) {
        e.stopPropagation();
        showMusicHint(`音量: ${Math.round(bgm.volume * 100)}%`, '#ffff00');
    });
    
    console.log('✨ パラダイス・カフェ 页面加载完成');
    console.log('🎵 音频文件:', bgm.src);
    </script>
</body>
</html>
